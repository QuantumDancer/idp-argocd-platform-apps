# Default values for platform-apps Helm chart
# This file provides default configuration that can be overridden

# Environment name
environment: homelab

# AWS / Loki S3 storage (set via Terraform for AWS environments)
awsRegion: ""
lokiStorageBucketNameChunks: ""
lokiStorageBucketNameRuler: ""

# Applications
longhorn:
  enabled: false
networkingConfig:
  enabled: false
gatewayApiCrds:
  enabled: false
