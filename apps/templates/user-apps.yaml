# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6" # Wait until all infrastructure is ready
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: {{ include "user-apps.repoURL" . }}
    targetRevision: main
    path: ./
    helm:
      releaseName: user-apps
      valueFiles:
        - values.yaml
        - environments/{{ .Values.environment }}.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: user-apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
