# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-database
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3" # Requires cloudnative-pg
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: {{ include "platform-apps.repoURL" . }}
    targetRevision: {{ include "platform-apps.targetRevision" . }}
    path: charts/grafana-database
    helm:
      releaseName: grafana-database
      valueFiles:
        - values.yaml
        - environments/{{ .Values.environment }}.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: grafana-database

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
