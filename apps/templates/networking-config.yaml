# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/application_v1alpha1.json
{{- if .Values.networkingConfig.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networking-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: {{ include "platform-apps.repoURL" . }}
    targetRevision: {{ include "platform-apps.targetRevision" . }}
    path: charts/networking-config
    helm:
      releaseName: networking-config
      valueFiles:
        - values.yaml
        - environments/{{ .Values.environment }}.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}
