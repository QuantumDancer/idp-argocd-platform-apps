# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: {{ include "platform-apps.repoURL" . }}
    targetRevision: {{ include "platform-apps.targetRevision" . }}
    path: charts/loki
    helm:
      releaseName: loki
      valueFiles:
        - values.yaml
        - environments/{{ .Values.environment }}.yaml
      {{- if ne .Values.environment "homelab" }}
      parameters:
        - name: loki.loki.storage.s3.region
          value: {{ .Values.awsRegion | quote }}
        - name: loki.loki.storage.bucketNames.chunks
          value: {{ .Values.lokiStorageBucketNameChunks | quote }}
        - name: loki.loki.storage.bucketNames.ruler
          value: {{ .Values.lokiStorageBucketNameRuler | quote }}
      {{- end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: loki

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
