kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
        limits:
          memory: "2Gi"
      retention: 7d
      # Enable remote write receiver for Alloy to send metrics
      enableRemoteWriteReceiver: true
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  grafana:
    sidecar:
      dashboards:
        label: grafana-dashboard
        labelValue: "" # Allow arbitrary label values (required for mixins)
        defaultFolderName: kube-prometheus-stack
        folderAnnotation: grafana-folder
        provider:
          foldersFromFilesStructure: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
    admin:
      existingSecret: "{{ .Release.Name }}-grafana-admin"
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: true
      size: 10Gi

    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        jsonData:
          maxLines: 1000
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "1"

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
      retention: 168h # retention should match '^(0|(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?)$'

  # Disable components that are not reachable by default in Talos Linux
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: false

  # Disable exporters (provided by k8s-monitoring)
  kubeStateMetrics:
    enabled: false
  nodeExporter:
    enabled: false

# Custom Gateway Configuration, since kube-prometheus-stack Helm chart does not support Gateway routes yet
gateway:
  name: external
  namespace: gateway
  hostnames:
    grafana: grafana.k8s.home.rottlr.de
    prometheus: prometheus.k8s.home.rottlr.de
    alertmanager: alertmanager.k8s.home.rottlr.de
