kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      # Configure Prometheus to ignore all ServiceMonitors/PodMonitors
      # Alloy will discover and scrape them instead via prometheusOperatorObjects
      # Using matchLabels with a label that will never exist ensures no objects are selected
      serviceMonitorSelector:
        matchLabels:
          non-existent-label: "never-matches"
      podMonitorSelector:
        matchLabels:
          non-existent-label: "never-matches"
      probeSelector:
        matchLabels:
          non-existent-label: "never-matches"
      scrapeConfigSelector:
        matchLabels:
          non-existent-label: "never-matches"
      serviceMonitorNamespaceSelector:
        matchLabels:
          non-existent-label: "never-matches"
      podMonitorNamespaceSelector:
        matchLabels:
          non-existent-label: "never-matches"
      probeNamespaceSelector:
        matchLabels:
          non-existent-label: "never-matches"
      scrapeConfigNamespaceSelector:
        matchLabels:
          non-existent-label: "never-matches"
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
        limits:
          memory: "2Gi"
      retention: 7d
      # Enable remote write receiver for Alloy to send metrics
      enableRemoteWriteReceiver: true
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
      retention: 168h # retention should match '^(0|(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?)$'

  # Disable Grafana because it is deployed via GrafanaOperator in  ../grafana/
  grafana:
    enabled: false

  # Disable components that are not reachable by default in Talos Linux
  kubeControllerManager:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: false

  # Disable exporters (provided by k8s-monitoring)
  kubeStateMetrics:
    enabled: false
  nodeExporter:
    enabled: false

  # Disable default rules. Rules and alerts are provided by the mixins (see ../../mixins/README.md)
  defaultRules:
    create: false

# Custom Gateway Configuration, since kube-prometheus-stack Helm chart does not support Gateway routes yet
gateway:
  name: external
  namespace: gateway
  hostnames:
    prometheus: prometheus.k8s.home.rottlr.de
    alertmanager: alertmanager.k8s.home.rottlr.de
