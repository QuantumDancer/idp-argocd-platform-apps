# Homelab environment-specific configuration for kube-prometheus-stack

gateway:
  name: external
  namespace: gateway
  hostnames:
    prometheus: prometheus.k8s.home.rottlr.de
    alertmanager: alertmanager.k8s.home.rottlr.de

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
        limits:
          memory: "2Gi"
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 20Gi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
      retention: 168h
