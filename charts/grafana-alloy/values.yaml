# Grafana Alloy unified telemetry collector
# Documentation: https://grafana.com/docs/alloy/latest/

alloy:
  alloy:
    # Alloy configuration in HCL format
    configMap:
      content: |
        // ========================================
        // Kubernetes Pod Discovery
        // ========================================
        // Discover all pods on the same node as this Alloy instance
        discovery.kubernetes "pods" {
          role = "pod"
          selectors {
            role = "pod"
            field = "spec.nodeName=" + env("HOSTNAME")
          }
        }

        // ========================================
        // Logs Collection → Loki
        // ========================================
        // Collect logs from all discovered pods with proper labeling
        loki.source.kubernetes "pods" {
          targets    = discovery.kubernetes.pods.targets
          forward_to = [loki.process.pod_logs.receiver]
        }

        // Process logs to extract log level from content
        loki.process "pod_logs" {
          // Detect log level from log content
          stage.regex {
            expression = "(?i)(?P<detected_level>debug|info|warn|warning|error|err|critical|fatal)"
          }

          stage.labels {
            values = {
              detected_level = "",
            }
          }

          forward_to = [loki.relabel.kubernetes.receiver]
        }

        // Relabel to include useful Kubernetes metadata
        loki.relabel "kubernetes" {
          forward_to = [loki.write.default.receiver]

          // Extract namespace
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          // Extract pod name
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          // Extract container name
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          // Extract app label
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }

          // Extract node name
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }

          // Keep job label as single identifier
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            target_label  = "job"
          }
        }

        // Write logs to Loki
        loki.write "default" {
          endpoint {
            url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
            tenant_id = "1"
          }
        }

        // ========================================
        // Future: Traces Collection → Tempo
        // ========================================
        // Uncomment when Tempo is deployed
        //
        // // Receive OTLP traces via gRPC and HTTP
        // otelcol.receiver.otlp "default" {
        //   grpc {
        //     endpoint = "0.0.0.0:4317"
        //   }
        //   http {
        //     endpoint = "0.0.0.0:4318"
        //   }
        //
        //   output {
        //     traces  = [otelcol.exporter.otlp.tempo.input]
        //   }
        // }
        //
        // // Export traces to Tempo
        // otelcol.exporter.otlp "tempo" {
        //   client {
        //     endpoint = "http://tempo-gateway.monitoring.svc.cluster.local:4317"
        //     tls {
        //       insecure = true
        //     }
        //   }
        // }

        // ========================================
        // Future: Metrics Collection → Prometheus
        // ========================================
        // Uncomment to collect metrics from pods
        //
        // // Scrape metrics from discovered pods
        // prometheus.scrape "pods" {
        //   targets    = discovery.kubernetes.pods.targets
        //   forward_to = [prometheus.remote_write.default.receiver]
        // }
        //
        // // Send metrics to Prometheus
        // prometheus.remote_write "default" {
        //   endpoint {
        //     url = "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
        //   }
        // }

  # Deploy as DaemonSet (one pod per node)
  controller:
    type: "daemonset"

  # Service account with RBAC for Kubernetes discovery
  serviceAccount:
    create: true

  # Resource limits for light usage
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"

  # Future: Expose ports for OTLP when Tempo is added
  # service:
