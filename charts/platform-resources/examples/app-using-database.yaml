---
# Example: Application consuming a PostgreSQL database
#
# This example shows how an application can use the PostgreSQLDatabase XRD
# and connect to it using the generated connection secret.

# Step 1: Create the database
apiVersion: idp.rottler.io/v1alpha1
kind: PostgreSQLDatabase
metadata:
  name: myapp-db
  namespace: myapp
spec:
  compute: small
  storage: 4Gi
  version: "17"
  ha: false

---
# Step 2: Deploy your application using the connection secret
#
# The database automatically creates a secret named "{database-name}-superuser"
# containing connection details.
#
# Secret contents:
#   username: postgres
#   password: <auto-generated>
#   host: {database-name}-rw.{namespace}.svc.cluster.local
#   port: "5432"
#   dbname: postgres
#   uri: postgresql://postgres:<password>@<host>:5432/postgres
#   jdbc-uri: jdbc:postgresql://<host>:5432/postgres

apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: app
        image: myorg/myapp:latest
        env:
        # Option 1: Use individual secret keys
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: dbname

        # Option 2: Use the complete connection URI
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: uri

        # For Java applications using JDBC
        # - name: JDBC_DATABASE_URL
        #   valueFrom:
        #     secretKeyRef:
        #       name: myapp-db-superuser
        #       key: jdbc-uri

---
# Step 3 (optional): Create a dedicated database user
#
# The superuser credentials are powerful. For production, you may want to
# create application-specific users with limited privileges using a Job
# or init container.

apiVersion: batch/v1
kind: Job
metadata:
  name: create-app-user
  namespace: myapp
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: create-user
        image: postgres:17
        env:
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: host
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: port
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: password
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: myapp-db-superuser
              key: dbname
        command:
        - /bin/bash
        - -c
        - |
          set -e

          # Create application database
          psql -c "CREATE DATABASE IF NOT EXISTS myapp;"

          # Create application user (use a Kubernetes secret for the password)
          psql -c "CREATE USER myapp_user WITH PASSWORD 'change-me';"

          # Grant privileges
          psql -d myapp -c "GRANT ALL PRIVILEGES ON DATABASE myapp TO myapp_user;"
          psql -d myapp -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO myapp_user;"
          psql -d myapp -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO myapp_user;"

          echo "User created successfully"
