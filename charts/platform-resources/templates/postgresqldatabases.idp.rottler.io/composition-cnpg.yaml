# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/apiextensions.crossplane.io/composition_v1.json
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: postgresqldatabase-cnpg
  labels:
    # Kubernetes standard labels
    app.kubernetes.io/name: postgresql-composition
    app.kubernetes.io/instance: cnpg-cloudnative
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/component: database-composition
    app.kubernetes.io/managed-by: helm

    # IDP platform labels
    idp.rottler.io/team: platform
    idp.rottler.io/environment: homelab
    idp.rottler.io/tier: platform

    # Cost allocation
    idp.rottler.io/cost-center: platform
    idp.rottler.io/project: idp

    # Crossplane integration
    crossplane.io/xrd: postgresqldatabases.idp.rottler.io

    # Label to select composition
    provider: cnpg
spec:
  compositeTypeRef:
    apiVersion: idp.rottler.io/v1alpha1
    kind: PostgreSQLDatabase
  mode: Pipeline
  pipeline:
  - step: create-deployment-and-service
    functionRef:
      name: crossplane-contrib-function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ `{{- $secretType := .observed.composite.resource.spec.connectionSecret.type | default "pull" -}}
          {{- $databaseName := .observed.composite.resource.spec.databaseName | default .observed.composite.resource.metadata.name -}}
          {{- $owner := .observed.composite.resource.spec.owner | default .observed.composite.resource.metadata.name -}}
          {{- $namespace := .observed.composite.resource.metadata.namespace -}}
          {{- $xrName := .observed.composite.resource.metadata.name -}}
          {{- $vaultPath := .observed.composite.resource.spec.connectionSecret.vaultPath | default (printf "idp/databases/%s/%s" $namespace $databaseName) -}}
          {{- $environment := index .observed.composite.resource.metadata.labels "idp.rottler.io/environment" | default "homelab" -}}
          {{- $computeTier := .observed.composite.resource.spec.compute -}}
          {{- $cpuRequest := "" -}}
          {{- $memoryRequest := "" -}}
          {{- $memoryLimit := "" -}}
          {{- if eq $environment "homelab" -}}
            {{- if eq $computeTier "small" -}}
              {{- $cpuRequest = "100m" -}}
              {{- $memoryRequest = "512Mi" -}}
              {{- $memoryLimit = "512Mi" -}}
            {{- else if eq $computeTier "medium" -}}
              {{- $cpuRequest = "500m" -}}
              {{- $memoryRequest = "1Gi" -}}
              {{- $memoryLimit = "1Gi" -}}
            {{- else if eq $computeTier "large" -}}
              {{- $cpuRequest = "1000m" -}}
              {{- $memoryRequest = "2Gi" -}}
              {{- $memoryLimit = "2Gi" -}}
            {{- end -}}
          {{- else if eq $environment "aws" -}}
            {{- if eq $computeTier "small" -}}
              {{- $cpuRequest = "1" -}}
              {{- $memoryRequest = "4Gi" -}}
              {{- $memoryLimit = "4Gi" -}}
            {{- else if eq $computeTier "medium" -}}
              {{- $cpuRequest = "2" -}}
              {{- $memoryRequest = "8Gi" -}}
              {{- $memoryLimit = "8Gi" -}}
            {{- else if eq $computeTier "large" -}}
              {{- $cpuRequest = "4" -}}
              {{- $memoryRequest = "16Gi" -}}
              {{- $memoryLimit = "16Gi" -}}
            {{- end -}}
          {{- end -}}
          {{- $secretName := printf "%s-credentials" $xrName -}}
          {{- $labels := dict
            "app.kubernetes.io/name" "postgresql-database-instance"
            "app.kubernetes.io/instance" .observed.composite.resource.metadata.name
            "app.kubernetes.io/component" "database-instance"
            "app.kubernetes.io/managed-by" "crossplane"
            "idp.rottler.io/team" (index .observed.composite.resource.metadata.labels "idp.rottler.io/team")
            "idp.rottler.io/environment" (index .observed.composite.resource.metadata.labels "idp.rottler.io/environment")
            "idp.rottler.io/tier" (index .observed.composite.resource.metadata.labels "idp.rottler.io/tier")
            "idp.rottler.io/cost-center" (index .observed.composite.resource.metadata.labels "idp.rottler.io/cost-center")
            "idp.rottler.io/project" (index .observed.composite.resource.metadata.labels "idp.rottler.io/project")
          -}}
          {{- if eq $secretType "pull" }}` }}
          ---
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: {{ `{{ $xrName }}` }}-external-secret
            labels:
              {{ `{{- range $key, $value := $labels }}` }}
              {{ `{{ $key }}` }}: {{ `{{ $value | quote }}` }}
              {{ `{{- end }}` }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: external-secret
          spec:
            secretStoreRef:
              name: vault-backend
              kind: ClusterSecretStore
            refreshInterval: "1h0m0s"
            target:
              name: {{ `{{ $secretName }}` }}
              creationPolicy: Owner
            dataFrom:
              - extract:
                  key: {{ `{{ $vaultPath }}` }}
                  conversionStrategy: Default
                  decodingStrategy: None
                  metadataPolicy: None
          {{ `{{- end }}
          {{- if eq $secretType "push" }}` }}
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ `{{ $secretName }}` }}
            labels:
              {{ `{{- range $key, $value := $labels }}` }}
              {{ `{{ $key }}` }}: {{ `{{ $value | quote }}` }}
              {{ `{{- end }}` }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: database-secret
          type: Opaque
          stringData:
            username: {{ `{{ $owner }}` }}
            password: {{ `{{ randAlphaNum 32 }}` }}
          ---
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: {{ `{{ $xrName }}` }}-push-secret
            labels:
              {{ `{{- range $key, $value := $labels }}` }}
              {{ `{{ $key }}` }}: {{ `{{ $value | quote }}` }}
              {{ `{{- end }}` }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: push-secret
          spec:
            refreshInterval: 1h
            secretStoreRefs:
              - name: vault-backend
                kind: ClusterSecretStore
            selector:
              secret:
                name: {{ `{{ $secretName }}` }}
            data:
              - match:
                  secretKey: username
                  remoteRef:
                    remoteKey: {{ `{{ $vaultPath }}` }}
                    property: username
              - match:
                  secretKey: password
                  remoteRef:
                    remoteKey: {{ `{{ $vaultPath }}` }}
                    property: password
          {{ `{{- end }}` }}
          ---
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: {{ `{{ .observed.composite.resource.metadata.name }}` }}
            labels:
              {{ `{{- range $key, $value := $labels }}` }}
              {{ `{{ $key }}` }}: {{ `{{ $value | quote }}` }}
              {{ `{{- end }}` }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: cluster
          spec:
            instances: {{ `{{ if .observed.composite.resource.spec.ha }}3{{ else }}1{{ end }}` }}
            imageName: ghcr.io/cloudnative-pg/postgresql:{{ `{{ .observed.composite.resource.spec.version }}` }}
            storage:
              size: {{ `{{ .observed.composite.resource.spec.storage }}` }}
            resources:
              requests:
                cpu: {{ `{{ $cpuRequest }}` }}
                memory: {{ `{{ $memoryRequest }}` }}
              limits:
                memory: {{ `{{ $memoryLimit }}` }}
            monitoring:
              enablePodMonitor: true
            bootstrap:
              initdb:
                database: {{ `{{ $databaseName }}` }}
                owner: {{ `{{ $owner }}` }}
                secret:
                  name: {{ `{{ $secretName }}` }}
          ---
          apiVersion: idp.rottler.io/v1alpha1
          kind: PostgreSQLDatabase
          status:
            phase: {{ `{{ get (getComposedResource . "cluster").status "phase" | default "Provisioning" }}` }}
            readyInstances: {{ `{{ get (getComposedResource . "cluster").status "readyInstances" | default 0 }}` }}
            ready: {{ `{{ $cluster := getComposedResource . "cluster" }}{{ $ready := false }}{{ range $cluster.status.conditions }}{{ if and (eq .type "Ready") (eq .status "True") }}{{ $ready = true }}{{ end }}{{ end }}{{ $ready }}` }}
            connectionDetailsSecretRef: {{ `{{ $secretName }}` }}
            endpoint: {{ `{{ $endpoint := get (getComposedResource . "cluster").status "writeService" }}{{ if $endpoint }}{{ $endpoint }}{{ end }}` }}
            readOnlyEndpoint: {{ `{{ $readEndpoint := get (getComposedResource . "cluster").status "readService" }}{{ if $readEndpoint }}{{ $readEndpoint }}{{ end }}` }}
            currentPrimary: {{ `{{ $primary := get (getComposedResource . "cluster").status "currentPrimary" }}{{ if $primary }}{{ $primary }}{{ end }}` }}
  - step: automatically-detect-ready-composed-resources
    functionRef:
      name: crossplane-contrib-function-auto-ready
