---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane:composed:cnpg-manager
  labels:
    # Kubernetes standard labels
    app.kubernetes.io/name: postgresql-database-rbac
    app.kubernetes.io/instance: cnpg-composer
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/component: database-composition-rbac
    app.kubernetes.io/managed-by: helm

    # IDP platform labels
    idp.rottler.io/team: platform
    idp.rottler.io/environment: homelab
    idp.rottler.io/tier: platform

    # Cost allocation
    idp.rottler.io/cost-center: platform
    idp.rottler.io/project: idp
rules:
  # CloudNativePG Cluster management
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - clusters
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - clusters/status
    verbs:
      - get
      - list
      - watch
  # Secret management (for push mode)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # ExternalSecret management (for pull mode)
  - apiGroups:
      - external-secrets.io
    resources:
      - externalsecrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - external-secrets.io
    resources:
      - externalsecrets/status
    verbs:
      - get
      - list
      - watch
  # PushSecret management (for push mode)
  - apiGroups:
      - external-secrets.io
    resources:
      - pushsecrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - external-secrets.io
    resources:
      - pushsecrets/status
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane:composed:cnpg-manager
  labels:
    # Kubernetes standard labels
    app.kubernetes.io/name: postgresql-database-rbac
    app.kubernetes.io/instance: cnpg-composer
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/component: database-composition-rbac-binding
    app.kubernetes.io/managed-by: helm

    # IDP platform labels
    idp.rottler.io/team: platform
    idp.rottler.io/environment: homelab
    idp.rottler.io/tier: platform

    # Cost allocation
    idp.rottler.io/cost-center: platform
    idp.rottler.io/project: idp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane:composed:cnpg-manager
subjects:
  - kind: ServiceAccount
    name: crossplane
    namespace: crossplane-system
