# https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/
loki:
  loki:
    # Critical: Set replication factor to 1 for single replica deployments
    commonConfig:
      replication_factor: 1

    # Schema configuration
    schemaConfig:
      configs:
        - from: "2025-11-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage:
      type: filesystem

    ingester:
      chunk_encoding: snappy

    querier:
      max_concurrent: 2

    pattern_ingester:
      enabled: true

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 168h # 7 days retention

    compactor:
      retention_enabled: true
      delete_request_store: filesystem

  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1

    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"

    persistence:
      enabled: true
      size: 20Gi

  # Gateway configuration
  gateway:
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"

  minio:
    enabled: false

  # https://serverfault.com/questions/1160162/installation-loki-grafana-limit-resources-used
  chunksCache:
    enabled: true
    allocatedMemory: 1024 # 1GB
  resultsCache:
    enabled: true
    allocatedMemory: 512 # 512MB

  # Zero out replica counts of other deployment modes
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomCompactor:
    replicas: 0
  bloomGateway:
    replicas: 0

loki-mixin:
  grafanaDashboard:
    enabled: true
    folder: "Observability - Loki"
