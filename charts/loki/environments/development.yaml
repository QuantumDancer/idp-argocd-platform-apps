# https://grafana.com/docs/loki/latest/setup/install/helm/install-microservices/
# https://github.com/grafana/loki/blob/main/production/helm/loki/distributed-values.yaml

---
loki:
  loki:
    ingester:
      chunk_encoding: snappy
    tracing:
      enabled: true
    querier:
      max_concurrent: 4
    limits_config:
      retention_period: 336h # 14 days retention

    schemaConfig:
      configs:
        - from: "2025-11-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage:
      type: s3
      bucketNames:
        chunks: loki-chunks # Overwritten by root app (value from Terraform)
        ruler: loki-ruler # Overwritten by root app (value from Terraform)
      s3:
        region: eu-central-1 # Overwritten by root app (value from Terraform)

  deploymentMode: Distributed
  
  ingester:
    replicas: 3
  querier:
    replicas: 3
    maxUnavailable: 2
  queryFrontend:
    replicas: 2
    maxUnavailable: 1
  queryScheduler:
    replicas: 2
  distributor:
    replicas: 3
    maxUnavailable: 2
  compactor:
    replicas: 1
  indexGateway:
    replicas: 2
    maxUnavailable: 1
  
  # optional experimental components
  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
  
  # Zero out replica counts of other deployment modes
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  
  singleBinary:
    replicas: 0
