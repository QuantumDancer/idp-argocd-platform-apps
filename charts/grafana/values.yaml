# Grafana configuration
grafana:
  hostname: grafana.k8s.home.rottlr.de # Default, override in environments/<env>.yaml

# Gateway configuration
gateway:
  name: external # Default, override in environments/<env>.yaml
  namespace: gateway

# Grafana Operator configuration
grafana-operator:
  namespaceOverride: grafana # Set namespaceOverride, otherwise Trivy fails to render this chart
  dashboard:
    enabled: true
  serviceMonitor:
    enabled: true
