# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumbgpclusterconfig_v2alpha1.json
{{- if .Values.bgp.enabled }}
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      topology.kubernetes.io/region: {{ .Values.bgp.clusterConfiguration.name }}-{{ .Values.bgp.clusterConfiguration.environment }}
      topology.kubernetes.io/zone: {{ .Values.bgp.clusterConfiguration.zone }}
  bgpInstances:
    - name: instance-{{ .Values.bgp.localASN }}
      localASN: {{ .Values.bgp.localASN }}
      peers:
        - name: peer-{{ .Values.bgp.localASN }}-{{ .Values.bgp.clusterConfiguration.zone }}-{{ .Values.bgp.clusterConfiguration.environment }}
          peerASN: {{ .Values.bgp.peerASN }}
          peerAddress: {{ .Values.bgp.peerAddress }}
          peerConfigRef:
            name: "cilium-peer"
{{- end }}
