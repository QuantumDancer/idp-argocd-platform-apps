# Vault configuration
vault:
  server: "https://vault.home.rottlr.de:8200"  # Default, override in environments/<env>.yaml
  path: "secrets"
  version: "v2"
  auth:
    kubernetes:
      mountPath: "kubernetes"
      role: "external-secrets-operator"
      audiences: []
    # Create vault-auth SA and auth-delegator ClusterRoleBinding via Helm.
    # Set to false when Terraform manages these resources (e.g. dev, prod).
    createResources: true

# Values for external-secrets subchart
external-secrets:
  installCRDs: true

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
