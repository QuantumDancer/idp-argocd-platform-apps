{{ if .Values.additionalRepoSecrets }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-idp-argocd-user-apps
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: "1h0m0s"
  target:
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: {{ .Values.userApps.repoURL }}
        username: "{{ `{{ .username }}` }}"
        password: "{{ `{{ .password }}` }}"
  dataFrom:
  - extract:
      key: idp/platform/argocd/idp-group-pull-secret
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
{{- end }}
