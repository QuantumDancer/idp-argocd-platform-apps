apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: {{ .Values.argocd.namespace }}
spec:
  hostnames:
  - {{ .Values.argocd.hostname }}

  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.gateway.name }}
    namespace: {{ .Values.gateway.namespace }}

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: {{ .Values.argocd.serviceName }}
      port: {{ .Values.argocd.servicePort }}
      weight: 1
