apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://gitlab.home.rottlr.de/idp/platform/idp-argocd-platform-apps.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true # Delete resources when removed from Git
      selfHeal: true # Automatically sync if cluster state drifts
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
