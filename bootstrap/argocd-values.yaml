redis-ha:
  enabled: true

controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: argocd
      additionalLabels:
        release: kube-prometheus-stack
      relabelings:
        # Set job label for Alloy integration pattern
        - sourceLabels: [__address__]
          targetLabel: job
          replacement: "integrations/argocd"
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

configs:
  params:
    # Allow insecure connections since TLS is terminated at the Gateway
    server.insecure: true
  cm:
    url: https://argocd.k8s.home.rottlr.de

server:
  autoscaling:
    enabled: true
    minReplicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: argocd
      additionalLabels:
        release: kube-prometheus-stack
      relabelings:
        # Set job label for Alloy integration pattern
        - sourceLabels: [__address__]
          targetLabel: job
          replacement: "integrations/argocd"
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: argocd
      additionalLabels:
        release: kube-prometheus-stack
      relabelings:
        # Set job label for Alloy integration pattern
        - sourceLabels: [__address__]
          targetLabel: job
          replacement: "integrations/argocd"
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

applicationSet:
  replicas: 2
