redis-ha:
  enabled: true

controller:
  replicas: 1

configs:
  params:
    # Allow insecure connections since TLS is terminated at the Gateway
    server.insecure: true
  cm:
    url: https://argocd.k8s.home.rottlr.de

server:
  autoscaling:
    enabled: true
    minReplicas: 2

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2

applicationSet:
  replicas: 2
