redis-ha:
  enabled: true

controller:
  replicas: 1

configs:
  params:
    # Allow insecure connections since TLS is terminated at the Gateway
    server.insecure: true
  cm:
    url: https://argocd.k8s.home.rottlr.de

server:
  autoscaling:
    enabled: true
    minReplicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"

applicationSet:
  replicas: 2
